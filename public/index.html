<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="名言を作成して Instagram にシェアできる学習用 SaaS" />
  <title>QuoteShare — 名言を作って共有</title>
  <link rel="stylesheet" href="styles/style.css" />
</head>
<body>
  <header class="app-header">
    <h1 class="app-title">QuoteShare</h1>
    <nav class="app-nav">
      <button id="nav-editor" class="nav-btn is-active" type="button">エディタ</button>
      <button id="nav-gallery" class="nav-btn" type="button">ギャラリー</button>
    </nav>
  </header>

  <main class="app-main">
    <!-- ===== エディタ画面 ===== -->
    <section id="view-editor" class="view is-visible" aria-label="エディタ">
      <div class="editor-grid">
        <!-- プレビュー -->
        <div class="preview-wrap">
          <canvas
            id="preview-canvas"
            width="1080"
            height="1080"
            aria-label="名言プレビュー"
          ></canvas>
        </div>

        <!-- フォーム -->
        <form id="editor-form" class="editor-form" autocomplete="off">
          <label class="field">
            <span class="field-label">名言</span>
            <textarea
              id="input-text"
              rows="4"
              maxlength="140"
              placeholder="今日のあなたを支える一言を…"
              required
            >人生で最も重要なのは、自分が信じる道を歩むことだ。</textarea>
          </label>

          <label class="field">
            <span class="field-label">著者</span>
            <input id="input-author" type="text" maxlength="40" value="匿名" />
          </label>

          <label class="field">
            <span class="field-label">テンプレート</span>
            <select id="input-template">
              <option value="minimal">ミニマル</option>
              <option value="serif">セリフ</option>
              <option value="bold">ボールド</option>
            </select>
          </label>

          <label class="field">
            <span class="field-label">背景色</span>
            <input id="input-bg" type="color" value="#0f172a" />
          </label>

          <label class="field">
            <span class="field-label">文字色</span>
            <input id="input-fg" type="color" value="#f8fafc" />
          </label>

          <div class="action-row">
            <button id="btn-save" type="submit" class="btn btn-primary">
              保存
            </button>
          </div>

          <div class="action-row">
            <button id="btn-download" type="button" class="btn">PNG をダウンロード</button>
            <button id="btn-share" type="button" class="btn btn-accent">Instagram にシェア</button>
          </div>

          <p id="status" class="status" role="status" aria-live="polite"></p>
        </form>

        <dialog id="share-dialog" class="share-dialog" aria-labelledby="share-dialog-title">
          <div class="share-dialog-panel">
            <h2 id="share-dialog-title">Instagram に投稿</h2>
            <p id="share-dialog-message" class="share-dialog-message"></p>
            <div class="share-dialog-actions">
              <button id="btn-copy-caption" type="button" class="btn">キャプションをコピー</button>
              <a class="btn btn-accent" href="https://www.instagram.com/" target="_blank" rel="noreferrer">Instagram を開く</a>
              <button id="btn-close-share" type="button" class="btn btn-secondary">閉じる</button>
            </div>
          </div>
        </dialog>
      </div>
    </section>

    <!-- ===== ギャラリー画面 ===== -->
    <section id="view-gallery" class="view" aria-label="ギャラリー">
      <h2 class="view-title">保存した名言</h2>
      <ul id="gallery-list" class="gallery-list" aria-live="polite"></ul>
      <p id="gallery-empty" class="gallery-empty">まだ保存された名言はありません。</p>
    </section>
  </main>

  <footer class="app-footer">
    <small>
      QuoteShare — 学習用 SaaS / HTML + CSS + JavaScript /
      <a href="../README.md">README</a>
    </small>
  </footer>

  <script src="scripts/app.js" defer></script>
</body>
</html>
