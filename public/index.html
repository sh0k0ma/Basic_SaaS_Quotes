<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="名言を作成して PNG 画像としてダウンロードできる学習用フロントエンドアプリ" />
  <title>QuoteShare — 名言画像を作る</title>
  <link rel="stylesheet" href="styles/style.css" />
</head>
<body>
  <header class="app-header">
    <h1 class="app-title">QuoteShare</h1>
  </header>

  <main class="app-main">
    <!-- ===== エディタ画面 ===== -->
    <section aria-label="エディタ">
      <div class="editor-grid">
        <!-- プレビュー -->
        <div class="preview-wrap">
          <canvas
            id="preview-canvas"
            width="1080"
            height="1080"
            aria-label="名言プレビュー"
          ></canvas>
        </div>

        <!-- フォーム -->
        <form id="editor-form" class="editor-form" autocomplete="off">
          <label class="field">
            <span class="field-label">名言</span>
            <textarea
              id="input-text"
              rows="4"
              maxlength="140"
              placeholder="今日のあなたを支える一言を…"
              required
            >人生で最も重要なのは、自分が信じる道を歩むことだ。</textarea>
          </label>

          <label class="field">
            <span class="field-label">著者</span>
            <input id="input-author" type="text" maxlength="40" value="匿名" />
          </label>

          <label class="field">
            <span class="field-label">テンプレート</span>
            <select id="input-template">
              <option value="minimal">ミニマル</option>
              <option value="serif">セリフ</option>
              <option value="bold">ボールド</option>
            </select>
          </label>

          <label class="field">
            <span class="field-label">背景色</span>
            <input id="input-bg" type="color" value="#0f172a" />
          </label>

          <label class="field">
            <span class="field-label">文字色</span>
            <input id="input-fg" type="color" value="#f8fafc" />
          </label>

          <div class="action-row">
            <button id="btn-download" type="button" class="btn btn-primary">PNG をダウンロード</button>
          </div>

          <p id="status" class="status" role="status" aria-live="polite"></p>
        </form>
      </div>
    </section>
  </main>

  <footer class="app-footer">
    <small>
      QuoteShare — 学習用フロントエンド / HTML + CSS + JavaScript /
      <a href="https://github.com/sh0k0ma/Basic_SaaS_Quotes">GitHub README</a>
    </small>
  </footer>

  <script src="scripts/app.js" defer></script>
</body>
</html>
